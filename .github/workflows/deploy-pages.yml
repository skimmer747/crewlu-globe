name: Deploy to GitHub Pages

# Reliable replacement for the flaky legacy gh-pages branch build.
# Builds the Vite site in CI and publishes it to Pages (custom domain globe.crewlu.net
# is held in the Pages config + dist/CNAME). Deploys on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    # This repo's Pages backend chronically returns "Deployment failed, try again later" on the
    # first attempt but succeeds on a retry — so try up to 3 times before failing the run.
    steps:
      - id: a1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: a2
        if: steps.a1.outcome != 'success'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: a3
        if: steps.a1.outcome != 'success' && steps.a2.outcome != 'success'
        uses: actions/deploy-pages@v4
